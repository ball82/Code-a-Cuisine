<div class="lang" role="group" [attr.aria-label]="i18n.t('lang.label')">
  <button
    type="button"
    class="lang__btn"
    [class.is-active]="i18n.lang() === 'en'"
    [attr.aria-pressed]="i18n.lang() === 'en'"
    (click)="i18n.setLang('en')">
    EN
  </button>
  <span class="lang__sep" aria-hidden="true">/</span>
  <button
    type="button"
    class="lang__btn"
    [class.is-active]="i18n.lang() === 'de'"
    [attr.aria-pressed]="i18n.lang() === 'de'"
    (click)="i18n.setLang('de')">
    DE
  </button>
</div>
