<section class="hero">
  <app-language-toggle class="hero__lang" />

  <!-- Kaskadierende Teller-Fotos: rechts (Desktop) bzw. rechts angeschnitten (Mobile).
       Rein dekorativ → aria-hidden, leeres alt. -->
  <div class="hero__plates" aria-hidden="true">
    <img src="/img/teller_1.svg" alt="" />
    <img src="/img/teller_2.svg" alt="" />
    <img src="/img/teller_3.svg" alt="" />
  </div>

  <div class="hero__content">
    <img class="hero__logo" src="/img/logo_baige.svg" alt="Code à Cuisine" />

    <div class="hero__intro">
      <p class="hero__eyebrow">{{ i18n.t('landing.eyebrow') }}</p>
      <h1 class="hero__title">Code à Cuisine</h1>
      <a class="hero__cta" routerLink="/ingredients">{{ i18n.t('cta.getStarted') }}</a>
    </div>

    <div class="hero__inspiration">
      <p class="hero__inspiration-question">{{ i18n.t('landing.inspiration') }}</p>
      <a class="hero__cookbook-link" routerLink="/cookbook">{{ i18n.t('landing.goToCookbook') }}&nbsp;&rarr;</a>
    </div>
  </div>
</section>
