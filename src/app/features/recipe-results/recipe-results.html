<main class="results">
  <a class="results__logo-link" routerLink="/" aria-label="Code à Cuisine — home">
    <img class="results__logo" src="/img/logo_baige.svg" alt="Code à Cuisine" />
  </a>

  <header class="results__head">
    <div class="results__intro">
      <h1 class="results__title">{{ i18n.t('results.title') }}</h1>
      <p class="results__subtitle">{{ i18n.t('results.subtitle') }}</p>

      <ul class="results__tags" role="list">
        @for (tag of activeTags(); track tag) {
          <li class="results__tag">{{ i18n.t(tag) }}</li>
        }
      </ul>
    </div>

    <img class="results__image" src="/img/results_img.svg" alt="" aria-hidden="true" />
  </header>

  <section class="results__grid" aria-label="Generated recipes">
    @for (recipe of recipes(); track recipe.id; let i = $index) {
      <app-recipe-card [recipe]="recipe" [index]="i + 1" context="results" />
    }
  </section>

  <div class="results__cta">
    <a class="results__cta-link" routerLink="/ingredients">
      {{ i18n.t('cta.generateNew') }} <span aria-hidden="true">&rarr;</span>
    </a>
  </div>
</main>
